{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ titulo|default:"Erro" }} - Eventix</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1f3c88 0%, #39a2db 100%);
            min-height: 100vh; }
        .wrapper { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="card border-0 shadow" style="max-width: 520px; border-radius: 16px;">
        <div class="card-body p-4">
            <h4 class="mb-3">{{ titulo|default:"Erro" }}</h4>
            <p class="text-muted mb-0">{{ mensagem }}</p>
        </div>
    </div>
</div>
</body>
</html>
