{% extends 'dashboard_empresa/base.html' %}
{% block page_title %}Excluir regra{% endblock %}
{% block content %}
<nav aria-label="breadcrumb">
    <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="{% url 'dashboard_empresa:operacao_regras_lista' unidade.pk %}">Regras</a></li>
        <li class="breadcrumb-item active">Excluir</li>
    </ol>
</nav>
<div class="card col-md-8">
    <div class="card-body">
        <p>Excluir esta regra de recorrência? Turnos já gerados não são apagados automaticamente.</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Excluir</button>
            <a href="{% url 'dashboard_empresa:operacao_regras_lista' unidade.pk %}" class="btn btn-outline-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
